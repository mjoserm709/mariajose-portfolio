<main class="flex min-h-screen items-center justify-center bg-[#0B0B0F] px-5 py-10 text-[#F3F4F6]">
  <section class="w-full max-w-md rounded-lg border border-[#1E2128] bg-[#111318] p-6 shadow-2xl">
    <p class="text-xs font-black uppercase tracking-[0.18em] text-[#EF4444]">Admin</p>
    <h1 class="mt-3 text-3xl font-black">Iniciar sesion</h1>

    <form class="mt-7 grid gap-4" [formGroup]="form" (ngSubmit)="submit()">
      <label class="grid gap-2 text-sm font-semibold">
        Email
        <input class="rounded-md border border-[#1E2128] bg-[#0B0B0F] px-3 py-3 outline-none focus:border-[#DC2626]" type="email" formControlName="email" autocomplete="email" />
      </label>

      <label class="grid gap-2 text-sm font-semibold">
        Password
        <input class="rounded-md border border-[#1E2128] bg-[#0B0B0F] px-3 py-3 outline-none focus:border-[#DC2626]" type="password" formControlName="password" autocomplete="current-password" />
      </label>

      @if (errorMessage()) {
        <p class="rounded-md border border-[#DC2626]/40 bg-[#DC2626]/10 px-3 py-2 text-sm text-[#FCA5A5]">{{ errorMessage() }}</p>
      }

      <button class="mt-2 rounded-md bg-[#DC2626] px-4 py-3 text-sm font-bold text-white transition hover:bg-[#B91C1C] disabled:cursor-not-allowed disabled:opacity-60" type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </section>
</main>
