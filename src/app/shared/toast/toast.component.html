<section class="pointer-events-none fixed right-4 top-4 z-[100] grid w-[calc(100vw-2rem)] max-w-xl gap-2 sm:right-6 sm:top-6" aria-live="polite" aria-atomic="true">
  @for (toast of toasts(); track toast.id) {
    <article
      class="pointer-events-auto grid grid-cols-[44px_1fr_28px] items-center gap-4 rounded-lg border bg-[#111318]/95 p-4 shadow-2xl backdrop-blur-xl"
      [class.border-l-[#4ADE80]]="toast.type === 'success'"
      [class.border-l-[#EF4444]]="toast.type === 'error'"
      [class.border-l-[#F59E0B]]="toast.type === 'warning'"
      [class.border-l-[#8AB4FF]]="toast.type === 'info'"
      [class.border-[#26302A]]="toast.type === 'success'"
      [class.border-[#3A2024]]="toast.type === 'error'"
      [class.border-[#3B2E18]]="toast.type === 'warning'"
      [class.border-[#1E2B44]]="toast.type === 'info'"
      [attr.aria-label]="label(toast)"
      style="border-left-width: 3px;"
    >
      <div
        class="grid h-10 w-10 place-items-center rounded-full border text-xl"
        [class.border-[#4ADE80]]="toast.type === 'success'"
        [class.text-[#4ADE80]]="toast.type === 'success'"
        [class.border-[#EF4444]]="toast.type === 'error'"
        [class.text-[#EF4444]]="toast.type === 'error'"
        [class.border-[#F59E0B]]="toast.type === 'warning'"
        [class.text-[#F59E0B]]="toast.type === 'warning'"
        [class.border-[#8AB4FF]]="toast.type === 'info'"
        [class.text-[#8AB4FF]]="toast.type === 'info'"
      >
        @switch (icon(toast.type)) {
          @case ('check') {
            <span class="text-2xl leading-none">✓</span>
          }
          @case ('slash') {
            <span class="text-2xl leading-none">⊘</span>
          }
          @case ('warning') {
            <span class="text-xl leading-none">!</span>
          }
          @case ('info') {
            <span class="text-xl leading-none">i</span>
          }
        }
      </div>

      <div class="min-w-0">
        <h2 class="text-base font-black text-[#F3F4F6]">{{ toast.title }}</h2>
        <p class="mt-1 break-words text-sm leading-5 text-[#B8BDC7]">{{ toast.message }}</p>
      </div>

      <button class="grid h-7 w-7 place-items-center rounded text-2xl leading-none text-[#F3F4F6] transition hover:bg-[#1E2128]" type="button" (click)="dismiss(toast.id)" aria-label="Cerrar notificacion">
        ×
      </button>
    </article>
  }
</section>
